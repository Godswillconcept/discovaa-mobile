openapi: 3.0.3
info:
  title: Discovaa API
  version: 1.0.0
  description: API for booking service providers
paths:
  /api/accounts/me/:
    get:
      operationId: api_accounts_me_retrieve
      summary: Get authenticated user (me)
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserMe'
                  meta:
                    type: object
                    nullable: true
                  error:
                    type: object
                    nullable: true
                required:
                - success
                - data
                - meta
                - error
          description: ''
    patch:
      operationId: api_accounts_me_partial_update
      description: Upload id_number and ID document images for the authenticated user.
        Uses multipart/form-data for file uploads. These fields are locked after verification_status
        becomes VERIFIED.
      summary: Update verification documents (me)
      tags:
      - api
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserMeUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserMeUpdate'
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserMe'
                  meta:
                    type: object
                    nullable: true
                  error:
                    type: object
                    nullable: true
                required:
                - success
                - data
                - meta
                - error
          description: ''
    delete:
      operationId: api_accounts_me_destroy
      summary: Delete authenticated user account (soft delete)
      tags:
      - api
      security:
      - tokenAuth: []
      responses:
        '204':
          description: No response body

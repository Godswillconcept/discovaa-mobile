  /mgt/api/providers/{id}/availability/:
    get:
      operationId: mgt_api_providers_availability_retrieve
      description: 'Returns day-by-day availability derived from weekly availability
        rules and existing bookings. Each day includes available time windows (if
        rules exist) and existing bookings that block those windows. Query params:
        range=day|week|month|custom; date=YYYY-MM-DD (for day/week/month); from=YYYY-MM-DD&to=YYYY-MM-DD
        (for custom).'
      summary: Get provider availability per day for a range
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: Anchor date for day/week/month (YYYY-MM-DD).
      - in: query
        name: from
        schema:
          type: string
          format: date
        description: Start date for custom range (YYYY-MM-DD).
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this provider.
        required: true
      - in: query
        name: range
        schema:
          type: string
        description: day|week|month|custom (default day).
      - in: query
        name: to
        schema:
          type: string
          format: date
        description: End date for custom range (YYYY-MM-DD).
      tags:
      - mgt
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                        format: uuid
                        description: Provider ID
                      range:
                        type: object
                        properties:
                          from:
                            type: string
                            format: date
                          to:
                            type: string
                            format: date
                      days:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                            has_rules:
                              type: boolean
                              description: Whether provider has availability rules
                                configured
                            is_available_day:
                              type: boolean
                              description: Whether day has available windows (if rules
                                exist)
                            windows_utc:
                              type: array
                              items:
                                type: object
                                properties:
                                  start:
                                    type: string
                                    format: date-time
                                  end:
                                    type: string
                                    format: date-time
                              description: Available time windows in UTC (from weekly
                                rules)
                            bookings:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    format: uuid
                                  scheduled_start:
                                    type: string
                                    format: date-time
                                  scheduled_end:
                                    type: string
                                    format: date-time
                                  status:
                                    type: string
                              description: Existing bookings (REQUESTED/CONFIRMED)
                                for this day
                  meta:
                    type: object
                    nullable: true
                  error:
                    type: object
                    nullable: true
                required:
                - success
                - data
                - meta
                - error
              examples:
                DayAvailability:
                  value:
                    success: true
                    data:
                      provider: 123e4567-e89b-12d3-a456-426614174000
                      range:
                        from: '2025-12-31'
                        to: '2025-12-31'
                      days:
                      - date: '2025-12-31'
                        has_rules: true
                        is_available_day: true
                        windows_utc:
                        - start: '2025-12-31T08:00:00Z'
                          end: '2025-12-31T16:00:00Z'
                        bookings:
                        - id: 456e7890-e89b-12d3-a456-426614174001
                          scheduled_start: '2025-12-31T09:00:00+01:00'
                          scheduled_end: '2025-12-31T10:00:00+01:00'
                          status: CONFIRMED
                    meta: null
                    error: null
                  summary: Day availability
          description: ''
  /mgt/api/providers/{id}/availability/check/:
    get:
      operationId: mgt_api_providers_availability_check_retrieve
      description: Validates whether a provider is available for a specific time slot.
        Checks against weekly availability rules (if configured) and existing bookings.
        Returns availability status, reasons for unavailability, and conflicting bookings.
      summary: Check provider availability for a specific time slot
      parameters:
      - in: query
        name: end
        schema:
          type: string
        description: ISO datetime (e.g. 2025-12-31T10:00:00+01:00).
        required: true
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this provider.
        required: true
      - in: query
        name: start
        schema:
          type: string
        description: ISO datetime (e.g. 2025-12-31T09:00:00+01:00).
        required: true
      tags:
      - mgt
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                        format: uuid
                        description: Provider ID
                      available:
                        type: boolean
                        description: Whether the slot is available
                      reasons:
                        type: array
                        items:
                          type: string
                        description: Reasons why the slot is not available
                      conflicts:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            scheduled_start:
                              type: string
                              format: date-time
                            scheduled_end:
                              type: string
                              format: date-time
                            status:
                              type: string
                        description: Existing bookings that conflict with the requested
                          slot
                  meta:
                    type: object
                    nullable: true
                  error:
                    type: object
                    nullable: true
                required:
                - success

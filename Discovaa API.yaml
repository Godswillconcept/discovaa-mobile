components:
  schemas:
    AccountBalanceResponse:
      type: object
      properties:
        available:
          type: array
          items: {}
        pending:
          type: array
          items: {}
        instant_available:
          type: array
          items: {}
      required:
      - available
      - pending
    AccountUpdateResponse:
      type: object
      properties:
        update_url:
          type: string
          format: uri
      required:
      - update_url
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        provider:
          type: string
          format: uuid
        status:
          enum:
          - REQUESTED
          - CONFIRMED
          - CANCELLED
          - COMPLETED
          type: string
          description: |-
            * `REQUESTED` - Requested
            * `CONFIRMED` - Confirmed
            * `CANCELLED` - Cancelled
            * `COMPLETED` - Completed
          x-spec-enum-id: 72d4c23352f549be
          readOnly: true
        service_type:
          enum:
          - ONSITE
          - WORKSHOP
          type: string
          description: |-
            * `ONSITE` - Onsite
            * `WORKSHOP` - Workshop
          x-spec-enum-id: 8829b780d1dbe5ba
        scheduled_start:
          type: string
          format: date-time
        scheduled_end:
          type: string
          format: date-time
          nullable: true
        address_text:
          type: string
        location_point:
          type: object
          properties:
            type:
              type: string
              description: Geometry type (e.g., Point)
            coordinates:
              type: array
              items:
                type: number
              description: Coordinates array
          example:
            type: Point
            coordinates:
            - 77.5946
            - 12.9716
          nullable: true
        currency:
          type: string
          maxLength: 3
        total_amount:
          type: string

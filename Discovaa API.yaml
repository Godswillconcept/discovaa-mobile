  /api/bookings/:
    get:
      operationId: api_bookings_list
      parameters:
      - in: query
        name: currency
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: provider
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          x-spec-enum-id: 72d4c23352f549be
          enum:
          - CANCELLED
          - COMPLETED
          - CONFIRMED
          - REQUESTED
        description: |-
          * `REQUESTED` - Requested
          * `CONFIRMED` - Confirmed
          * `CANCELLED` - Cancelled
          * `COMPLETED` - Completed
      tags:
      - api
      security:
      - tokenAuth: []
      responses:

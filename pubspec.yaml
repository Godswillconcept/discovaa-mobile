name: discovaa
description: "A marketplace platform connecting artisans with clients seeking
  their services."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  cached_network_image: ^3.3.0
  logger: ^2.0.2
  cloud_firestore: ^6.3.0
  connectivity_plus: ^7.1.1
  country_picker: ^2.0.27
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  dotted_border: ^3.1.0
  equatable: ^2.0.5
  file_picker: ^11.0.2
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_storage: ^13.3.0
  fl_chart: ^1.2.0
  flutter_inappwebview: ^6.0.0
  flutter:
    sdk: flutter
  flutter_chat_types: ^3.6.2
  flutter_chat_ui: ^1.6.15
  flutter_form_builder: ^10.3.0+2
  flutter_hooks: ^0.21.3+1
  flutter_rating_bar: ^4.0.1
  flutter_riverpod: ^2.4.9
  flutter_secure_storage: ^10.0.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.2.3
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.0
  google_places_flutter: ^2.0.9
  font_awesome_flutter: ^11.0.0
  get_it: ^9.2.1
  go_router: ^17.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_cropper: ^12.2.1
  image_picker: ^1.0.4
  injectable: ^2.3.2
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  json_annotation: ^4.8.1
  mime: ^2.0.0
  open_filex: ^4.7.0
  path_provider: ^2.1.1
  pinput: ^6.0.2
  riverpod_annotation: ^2.3.3
  table_calendar: ^3.1.3
  timezone: ^0.11.0
  timeago: ^3.7.1
  url_launcher: ^6.3.2
  dropdown_button2: ^3.1.0
  uuid: ^4.2.1

dev_dependencies:
  # Code Generation
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  injectable_generator: ^2.4.1
  integration_test:
    sdk: flutter
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

  # Testing
  mockito: ^5.4.4

# Code Generation and Formatting
flutter_lints:
  rules:
    # Enable all recommended lints
    prefer_single_quotes: true
    prefer_const_constructors_in_immutables: true
    avoid_print: true
    prefer_final_fields: true
    prefer_final_locals: true
    avoid_unnecessary_containers: true
    prefer_const_literals_to_create_immutables: true
    avoid_redundant_argument_values: true
    prefer_is_empty: true
    prefer_is_not_empty: true
    avoid_types_on_closure_parameters: true
    prefer_if_elements_to_conditional_expressions: true
    avoid_catches_without_on_clauses: true
    use_key_in_widget_constructors: true
    prefer_const_constructors: true
    avoid_web_libraries_in_flutter: true
    prefer_relative_imports: true
    sort_constructors_first: true
    sort_pub_dependencies: true
    sort_child_properties_last: true

# Formatter configuration
dart_code_metrics:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/images/
    - assets/images/illustrations/
    - assets/images/logos/
    - assets/images/placeholders/
    - assets/icons/
    - assets/fonts/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Italic.ttf
        - asset: assets/fonts/Inter_18pt-Bold.ttf
        - asset: assets/fonts/Inter_18pt-BoldItalic.ttf
        - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
        - asset: assets/fonts/Inter_18pt-ExtraBoldItalic.ttf
        - asset: assets/fonts/Inter_18pt-ExtraLight.ttf
        - asset: assets/fonts/Inter_18pt-ExtraLightItalic.ttf
        - asset: assets/fonts/Inter_18pt-Light.ttf
        - asset: assets/fonts/Inter_18pt-LightItalic.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
        - asset: assets/fonts/Inter_18pt-MediumItalic.ttf
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
        - asset: assets/fonts/Inter_18pt-SemiBoldItalic.ttf
        - asset: assets/fonts/Inter_18pt-Thin.ttf
        - asset: assets/fonts/Inter_18pt-ThinItalic.ttf
        - asset: assets/fonts/Inter_24pt-Regular.ttf
        - asset: assets/fonts/Inter_24pt-Italic.ttf
        - asset: assets/fonts/Inter_24pt-Bold.ttf
        - asset: assets/fonts/Inter_24pt-BoldItalic.ttf
        - asset: assets/fonts/Inter_24pt-ExtraBold.ttf
        - asset: assets/fonts/Inter_24pt-ExtraBoldItalic.ttf
        - asset: assets/fonts/Inter_24pt-ExtraLight.ttf
        - asset: assets/fonts/Inter_24pt-ExtraLightItalic.ttf
        - asset: assets/fonts/Inter_24pt-Light.ttf
        - asset: assets/fonts/Inter_24pt-LightItalic.ttf
        - asset: assets/fonts/Inter_24pt-Medium.ttf
        - asset: assets/fonts/Inter_24pt-MediumItalic.ttf
        - asset: assets/fonts/Inter_24pt-SemiBold.ttf
        - asset: assets/fonts/Inter_24pt-SemiBoldItalic.ttf
        - asset: assets/fonts/Inter_24pt-Thin.ttf
        - asset: assets/fonts/Inter_24pt-ThinItalic.ttf
        - asset: assets/fonts/Inter_28pt-Regular.ttf
        - asset: assets/fonts/Inter_28pt-Italic.ttf
        - asset: assets/fonts/Inter_28pt-Bold.ttf
        - asset: assets/fonts/Inter_28pt-BoldItalic.ttf
        - asset: assets/fonts/Inter_28pt-ExtraBold.ttf
        - asset: assets/fonts/Inter_28pt-ExtraBoldItalic.ttf
        - asset: assets/fonts/Inter_28pt-ExtraLight.ttf
        - asset: assets/fonts/Inter_28pt-ExtraLightItalic.ttf
        - asset: assets/fonts/Inter_28pt-Light.ttf
        - asset: assets/fonts/Inter_28pt-LightItalic.ttf
        - asset: assets/fonts/Inter_28pt-Medium.ttf
        - asset: assets/fonts/Inter_28pt-MediumItalic.ttf
        - asset: assets/fonts/Inter_28pt-SemiBold.ttf
        - asset: assets/fonts/Inter_28pt-SemiBoldItalic.ttf
        - asset: assets/fonts/Inter_28pt-Thin.ttf
        - asset: assets/fonts/Inter_28pt-ThinItalic.ttf
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Launcher icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logos/app_logo.png"
  background_color: "#0F0F0F"
  remove_alpha_ios: true
  # Adaptive icons for Android 12+
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/images/logos/app_logo.png"

# Native splash screen configuration
flutter_native_splash:
  # Color of the splash screen background
  color: "#0F0F0F"

  # Image to display on splash screen
  image: assets/images/logos/app_logo.png

  # Android 12+ configuration
  android_12:
    # The image parameter for Android 12+ splash screen
    image: assets/images/logos/app_logo.png
    # Splash screen background color
    color: "#0F0F0F"
    # Icon background color (optional)
    icon_background_color: "#0F0F0F"

  # Android settings
  android: true
  android_gravity: center

  # iOS settings
  ios: true

  # Web settings (if needed)
  web: false

  # Fullscreen mode
  fullscreen: true

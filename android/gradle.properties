org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation to fix cross-drive path errors on Windows
# (pub cache on C: vs project on D: causes IllegalArgumentException in Kotlin daemon)
kotlin.incremental=false
